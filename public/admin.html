<!doctype html>
<html lang="pt-BR" data-page="admin">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>admin — tools.shiftsad.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />
  <style>
    .admin-page { max-width: 980px; }
    .login-card {
      max-width: 360px;
      margin-top: 32px;
      display: grid;
      gap: 12px;
    }
    .login-card .err {
      color: #d88a8a;
      font-size: 13px;
      font-family: var(--mono);
      min-height: 1em;
    }

    .tabs {
      margin-top: 12px;
      display: flex;
      gap: 22px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .tabs button {
      background: none; border: 0; padding: 12px 0;
      color: var(--muted); font-size: 14px; cursor: pointer;
      font-family: inherit;
      border-bottom: 1.5px solid transparent;
      margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s;
    }
    .tabs button:hover { color: var(--text); }
    .tabs button.is-active { color: var(--text); border-bottom-color: var(--text); }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin: 4px 0 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--border);
    }
    .summary__cell {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .summary__num {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .summary__num.is-warn { color: #f0c987; }
    .summary__num.is-bad  { color: #f0a8a8; }
    .summary__num.is-ok   { color: #9bd49b; }
    .summary__label { font-size: 12px; color: var(--muted); }

    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table th, .table td {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13.5px;
      vertical-align: top;
    }
    .table th {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      padding-top: 8px;
      padding-bottom: 8px;
    }
    .table th:first-child, .table td:first-child { padding-left: 0; }
    .table th:last-child, .table td:last-child { padding-right: 0; text-align: right; }
    .table .hash {
      font-family: var(--mono);
      font-size: 11.5px;
      color: var(--muted);
      word-break: break-all;
    }
    .table .mono { font-family: var(--mono); font-size: 12px; }
    .table .dim { color: var(--dim); font-size: 12px; }

    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 100px;
      font-family: var(--mono);
      font-size: 10.5px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      border: 1px solid var(--border-2);
      color: var(--muted);
    }
    .pill.is-bad   { color: #f0a8a8; border-color: #5a2a2a; }
    .pill.is-warn  { color: #f0c987; border-color: #5a4520; }
    .pill.is-ok    { color: #9bd49b; border-color: #2f5a2f; }

    .row-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .row-actions button, .row-actions a {
      background: none;
      border: 1px solid var(--border-2);
      color: var(--muted);
      font-size: 12px;
      padding: 4px 9px;
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      transition: color 0.12s, border-color 0.12s;
    }
    .row-actions button:hover, .row-actions a:hover { color: var(--text); border-color: var(--text); }
    .row-actions button.is-danger:hover { color: #f0a8a8; border-color: #5a2a2a; }

    .add-form {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
      margin-bottom: 18px;
    }
    @media (max-width: 600px) {
      .add-form { grid-template-columns: 1fr; }
    }
    .add-form input {
      padding: 9px 12px;
      font-size: 13.5px;
    }

    details.report {
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }
    details.report > summary {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      align-items: baseline;
      list-style: none;
      cursor: pointer;
      outline: none;
    }
    details.report > summary::-webkit-details-marker { display: none; }
    details.report > summary .name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    details.report .body {
      margin-top: 14px;
      padding-left: 4px;
      border-left: 1px solid var(--border);
      padding-left: 16px;
      display: grid;
      gap: 12px;
    }
    details.report .body dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 4px 16px;
      font-size: 12.5px;
      margin: 0;
    }
    details.report .body dt { color: var(--dim); font-family: var(--mono); }
    details.report .body dd { margin: 0; font-family: var(--mono); color: var(--muted); word-break: break-all; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: 4px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .toast.is-shown { opacity: 1; }
    .toast.is-err { color: #f0a8a8; border-color: #5a2a2a; }

    .empty {
      color: var(--dim);
      font-size: 13px;
      padding: 18px 0;
      text-align: center;
    }

    .header-actions {
      display: flex;
      gap: 14px;
      align-items: baseline;
      margin-bottom: 18px;
    }
    .header-actions__title { font-size: 13.5px; color: var(--muted); }
    .header-actions__spacer { flex: 1; }
    .header-actions button {
      background: none; border: 0; padding: 0;
      color: var(--muted); font-size: 13px; cursor: pointer;
      font-family: inherit;
    }
    .header-actions button:hover { color: var(--text); }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="page admin-page">
    <h1 class="page-title">admin</h1>

    <!-- LOGIN -->
    <section id="login" hidden>
      <p class="page-lede">Sessão expirada ou primeira vez. Entre com a senha.</p>
      <form class="login-card" id="login-form">
        <input class="input" id="password" type="password" placeholder="senha" autocomplete="current-password" required />
        <button class="btn" type="submit">Entrar</button>
        <div class="err" id="login-err"></div>
      </form>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboard" hidden>
      <div class="header-actions">
        <span class="header-actions__title mono" id="last-loaded"></span>
        <span class="header-actions__spacer"></span>
        <button id="refresh">recarregar</button>
        <button id="logout">sair</button>
      </div>

      <div class="summary" id="summary"></div>

      <div class="tabs" id="tabs">
        <button data-tab="reports" class="is-active">Reports</button>
        <button data-tab="hashes">Hashes</button>
        <button data-tab="packages">Packages</button>
        <button data-tab="urls">URLs</button>
        <button data-tab="allowed">Permitidos</button>
      </div>

      <div id="panel"></div>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="header.js"></script>
  <script src="admin.js"></script>
</body>
</html>
